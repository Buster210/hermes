services:
  hermes:
    build:
      context: .
      args:
        HERMES_VERSION:        # unset -> Dockerfile ARG default (pinned 0.15.2); set in env to override
        CACHEBUST: ${CACHEBUST:-}
    ports:
      - "${HOST_PORT:-7860}:7860"
    env_file:
      - .env
    environment:
      AGENT_NAME: ${AGENT_NAME:?run via ./run.sh <name>}
      TELEGRAM_BASE_URL: ${TELEGRAM_BASE_URL:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      AGENT_PERSONALITY: ${AGENT_PERSONALITY:-}
    volumes:
      - ./agents/${AGENT_NAME}/.state:/data/${AGENT_NAME}
